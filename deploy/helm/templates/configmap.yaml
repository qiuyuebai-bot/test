apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "knowledge-system.configMapName" . }}
  labels:
    {{- include "knowledge-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  {{- range $key, $value := .Values.appConfig }}
  {{- if or (eq $key "DATABASE_URL") (eq $key "REDIS_URL") (eq $key "CELERY_BROKER_URL") (eq $key "CELERY_RESULT_BACKEND") }}
  {{- else }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  # 动态生成的连接配置（覆盖 appConfig 中的同名默认值，确保与服务名一致）
  DATABASE_URL: {{ include "knowledge-system.databaseUrl" . | quote }}
  REDIS_URL: {{ include "knowledge-system.redisUrl" . | quote }}
  CELERY_BROKER_URL: {{ include "knowledge-system.celeryBrokerUrl" . | quote }}
  CELERY_RESULT_BACKEND: {{ include "knowledge-system.celeryResultBackend" . | quote }}
