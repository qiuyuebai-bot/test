{{- if .Values.migration.enabled -}}
{{- if .Values.backend.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "knowledge-system.fullname" . }}-db-migrate
  labels:
    {{- include "knowledge-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrate
  annotations:
    # Helm hook：安装/升级前执行数据库迁移
    "helm.sh/hook": pre-install, pre-upgrade
    # 在 ServiceAccount/ConfigMap/Secret 之后执行
    "helm.sh/hook-weight": "-5"
    # hook 执行前删除旧 Job（保留最近一次便于排错）
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "knowledge-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db-migrate
    spec:
      serviceAccountName: {{ include "knowledge-system.serviceAccountName" . }}
      restartPolicy: Never
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: db-migrate
          image: {{ include "knowledge-system.image" (list .Values.images.backend .Values.global) }}
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          workingDir: /app
          # 等待数据库就绪后执行 alembic upgrade head
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for database to be ready..."
              until python -c "import os; from sqlalchemy import create_engine; create_engine(os.environ['DATABASE_URL']).connect(); print('DB ready')" 2>/dev/null; do
                echo "Database not ready, retrying in 3s..."
                sleep 3
              done
              echo "Database is ready. Running migrations..."
              exec alembic upgrade head
          envFrom:
            - configMapRef:
                name: {{ include "knowledge-system.configMapName" . }}
            - secretRef:
                name: {{ include "knowledge-system.secretName" . }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- include "knowledge-system.resources" .Values.migration.resources | nindent 10 }}
{{- end }}
{{- end }}
