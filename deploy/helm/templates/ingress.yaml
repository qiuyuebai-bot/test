{{- if .Values.ingress.enabled -}}
{{- $fullName := include "knowledge-system.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "knowledge-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path | quote }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .service "frontend" }}{{ include "knowledge-system.frontendServiceName" $ }}{{ else if eq .service "backend" }}{{ include "knowledge-system.backendServiceName" $ }}{{ else }}{{ .service }}{{ end }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end -}}
