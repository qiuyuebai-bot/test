{{- if .Values.backup.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "knowledge-system.fullname" . }}-backup
  labels:
    {{- include "knowledge-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  timeZone: Asia/Shanghai
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            {{- include "knowledge-system.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          serviceAccountName: {{ include "knowledge-system.serviceAccountName" . }}
          restartPolicy: OnFailure
          {{- with .Values.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: backup
              # 使用 postgres 镜像（内置 pg_dump，无需运行时 pip install）
              image: {{ include "knowledge-system.image" (list .Values.images.postgres .Values.global) }}
              imagePullPolicy: {{ .Values.images.postgres.pullPolicy }}
              workingDir: /backup
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "[Backup Job] 开始 PostgreSQL 数据库备份..."
                  TIMESTAMP=$(date -u '+%Y%m%d_%H%M%S')
                  BACKUP_DIR="/backup/data"
                  BACKUP_FILE="${BACKUP_DIR}/db_backup_${TIMESTAMP}.dump"

                  mkdir -p "${BACKUP_DIR}"

                  # 执行 pg_dump（自定义格式 -Fc，支持压缩和选择性恢复）
                  echo "[Backup Job] 执行 pg_dump: ${BACKUP_FILE}"
                  pg_dump "${DATABASE_URL}" -Fc -f "${BACKUP_FILE}"

                  # 验证备份文件大小（< 1KB 视为失败）
                  BACKUP_SIZE=$(wc -c < "${BACKUP_FILE}" | tr -d ' ')
                  if [ "${BACKUP_SIZE}" -lt 1024 ]; then
                    echo "[Backup Job] 错误：备份文件过小 (${BACKUP_SIZE} bytes)，可能备份失败" >&2
                    rm -f "${BACKUP_FILE}"
                    exit 1
                  fi

                  echo "[Backup Job] 备份成功: ${BACKUP_FILE} (${BACKUP_SIZE} bytes)"

                  # 清理过期备份
                  RETENTION_DAYS={{ .Values.backup.retention.days }}
                  echo "[Backup Job] 清理超过 ${RETENTION_DAYS} 天的旧备份..."
                  find "${BACKUP_DIR}" -name "db_backup_*.dump" -type f -mtime +${RETENTION_DAYS} -delete 2>/dev/null || true
                  echo "[Backup Job] 清理完成"

                  # 列出当前备份
                  echo "[Backup Job] 当前备份列表:"
                  ls -lh "${BACKUP_DIR}"/db_backup_*.dump 2>/dev/null || echo "  （无备份文件）"

                  echo "[Backup Job] 备份任务完成"
              env:
                - name: DATABASE_URL
                  value: {{ include "knowledge-system.databaseUrl" . | quote }}
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "knowledge-system.secretName" . }}
                      key: POSTGRES_PASSWORD
              {{- include "knowledge-system.resources" .Values.backup.resources | nindent 14 }}
              volumeMounts:
                - name: backup-data
                  mountPath: /backup/data
          volumes:
            - name: backup-data
              persistentVolumeClaim:
                claimName: {{ include "knowledge-system.fullname" . }}-backup-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "knowledge-system.fullname" . }}-backup-data
  labels:
    {{- include "knowledge-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backup.persistence.size }}
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
{{- end -}}
