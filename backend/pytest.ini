[pytest]
minversion = 7.0
addopts = -v -s --tb=short --strict-markers
testpaths = tests
pythonpath = .
log_cli = true
log_cli_level = WARNING
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    asyncio: marks tests as async coroutines (run with pytest-asyncio)

# 覆盖率配置（通过 pytest --cov 启用，不影响日常运行）
[coverage:run]
source = app
omit =
    app/tests/*
    app/conftest.py
    */__pycache__/*

[coverage:report]
show_missing = true
precision = 2
skip_covered = false