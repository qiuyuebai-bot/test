name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run lint
        continue-on-error: true
      - run: npm run typecheck

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-cov
      - name: Run tests with coverage
        env:
          COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || '60' }}
        run: |
          cd backend
          pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=${COVERAGE_THRESHOLD} -q
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run Bandit (Python SAST)
        run: bandit -r backend/app -f json -o bandit-report.json || true
      - name: Run pip-audit (dependency vulnerabilities)
        run: pip-audit -r backend/requirements.txt || true
      - name: Run npm audit (frontend dependency vulnerabilities)
        run: npm audit --audit-level=high || true
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json

  openapi-check:
    name: OpenAPI Spec Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Export & validate OpenAPI spec
        run: |
          cd backend
          python scripts/export_openapi.py
      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/api/openapi.json
          retention-days: 30

  performance-smoke:
    name: Performance Smoke Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    env:
      APP_ENV: development
      DATABASE_URL: sqlite:///./data/ci-performance-smoke.db
      SECRET_KEY: ci-performance-smoke-secret-key-000000000000000000000000
      DEFAULT_ADMIN_PASSWORD: admin123
      SEED_ON_STARTUP: "true"
      SMOKE_P95_MS: "1000"
      SMOKE_P99_MS: "3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Start backend server
        run: |
          cd backend
          rm -f data/ci-performance-smoke.db
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../backend-smoke.log 2>&1 &
          echo $! > ../backend-smoke.pid
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become ready"
          cat ../backend-smoke.log
          exit 1
      - uses: grafana/setup-k6-action@v1
      - name: Run k6 smoke test
        run: k6 run tests/performance/smoke.js
        env:
          BASE_URL: http://localhost:8000
      - name: Print backend log
        if: always()
        run: cat backend-smoke.log || true
      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-results
          path: |
            *.json
            *.xml
          retention-days: 14
          if-no-files-found: ignore
